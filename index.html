<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessibility Focused Page</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .high-contrast {
            background-color: black;
            color: white;
        }
        .dyslexia-friendly {
            font-family: 'OpenDyslexic', sans-serif;
        }
    </style>
</head>
<body>
    <header>
        <h1>Accessibility Features</h1>
    </header>
    <main>
        <section>
            <h2>Resize Text</h2>
            <button onclick="resizeText('increase')">A+</button>
            <button onclick="resizeText('decrease')">A-</button>
        </section>
        <section>
            <h2>Color Contrast Modes</h2>
            <button onclick="toggleContrast()">Toggle High Contrast</button>
        </section>
        <section>
            <h2>Dyslexia-Friendly Font</h2>
            <button onclick="toggleDyslexiaFont()">Toggle Dyslexia Font</button>
        </section>
        <section>
            <h2>Text-to-Speech</h2>
            <button onclick="textToSpeech()">Read Text</button>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Accessibility Page</p>
    </footer>
    <script>
        let currentSize = 16;
        const resizeText = (action) => {
            const body = document.body;
            if (action === 'increase') {
                currentSize++;
            } else {
                currentSize--;
            }
            body.style.fontSize = currentSize + 'px';
        };
        let highContrast = false;
        const toggleContrast = () => {
            document.body.classList.toggle('high-contrast');
        };
        let dyslexiaMode = false;
        const toggleDyslexiaFont = () => {
            document.body.classList.toggle('dyslexia-friendly');
        };
        const textToSpeech = () => {
            const utterance = new SpeechSynthesisUtterance(document.body.innerText);
            window.speechSynthesis.speak(utterance);
        };
    </script>
</body>
</html>
